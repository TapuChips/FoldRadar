name: Daily foldable news refresh

on:
  schedule:
    - cron: "0 5 * * *"    # 05:00 UTC = morning Israel/Europe, before US wakes up
    - cron: "0 16 * * *"   # 16:00 UTC = catches news that broke during the US/EU day
  workflow_dispatch:         # manual run button in the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild news.html from feeds
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/build_news.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "foldradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.html index.html sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes today."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily news refresh $(date -u +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # foldradar.com is detached from Vercel's auto-assignment: neither git nor
      # CLI --prod deploys claim it, so we deploy and then alias both domains
      # explicitly. Fails loudly if anything goes wrong — a silent skip is what
      # let the live site sit on stale content for two days.
      - name: Publish to foldradar.com
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_WnZJkSXAggvrkhYsPGsAXm2t
          VERCEL_PROJECT_ID: prj_WTB6K53ZPqp1W8LQPwKdV05sXwvr
        run: |
          set -euo pipefail
          url=$(npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN" 2>/dev/null | tail -1)
          echo "Deployed: $url"
          npx --yes vercel@latest alias set "$url" foldradar.com     --token="$VERCEL_TOKEN"
          npx --yes vercel@latest alias set "$url" www.foldradar.com --token="$VERCEL_TOKEN"
          # prove it actually went live, don't just assume
          sleep 5
          live=$(curl -s "https://foldradar.com/news?cb=$(date +%s)" | grep -o 'Last refresh: [^<]*' | head -1)
          echo "LIVE => $live"
          echo "$live" | grep -q "$(date -u '+%B %-d, %Y')" || { echo "::error::foldradar.com did not update"; exit 1; }
