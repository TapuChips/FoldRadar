name: Daily foldable news refresh

on:
  schedule:
    - cron: "0 5 * * *"    # 05:00 UTC = morning Israel/Europe, before US wakes up
    - cron: "0 16 * * *"   # 16:00 UTC = catches news that broke during the US/EU day
  workflow_dispatch:         # manual run button in the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild news.html from feeds
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/build_news.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "foldradar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.html index.html sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes today."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily news refresh $(date -u +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # The git integration builds fine but never claims the foldradar.com domain,
      # so publish with the Vercel CLI — a --prod deploy does take the domain.
      - name: Publish to foldradar.com
        if: steps.commit.outputs.changed == 'true' && env.VERCEL_TOKEN != ''
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_WnZJkSXAggvrkhYsPGsAXm2t
          VERCEL_PROJECT_ID: prj_WTB6K53ZPqp1W8LQPwKdV05sXwvr
        run: npx --yes vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN"
